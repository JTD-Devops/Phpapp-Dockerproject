version: '3.8'

services:
  web:
    image: devikadockhub/phpapp:phpimg 
    ports:
      - "8082:80"
    volumes:
      - web_data:/var/www/html
    environment:
      - MYSQL_HOST=db
      - MYSQL_DATABASE=watchstore
      - MYSQL_USER=watchuser
      - MYSQL_PASSWORD=watchpass
    networks:
      - watchstore-network
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure

  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_DATABASE=watchstore
      - MYSQL_USER=watchuser
      - MYSQL_PASSWORD=watchpass
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - watchstore-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      timeout: 20s
      retries: 10
    deploy:
      placement:
        constraints:
          - node.role == manager

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8083:80"
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
      - PMA_ARBITRARY=1
    networks:
      - watchstore-network
    deploy:
      placement:
        constraints:
          - node.role == manager

volumes:
  mysql_data:
    driver: local
  web_data:
    driver: local

networks:
  watchstore-network:
    driver: overlay
    name: watchstore-network
    attachable: true
    ipam:
      config:
        - subnet: 172.20.0.0/16
